

bundle:
  name: databricks-paginated-reports

variables:
  catalog_name:
    description: "Name of the catalog to use"
    default: "reporting_data"
  schema_name:
    description: "Name of the schema to use"
    default: "paginated"
  volume_name:
    description: "Name of the volume to use"
    default: "app_files"
  app_config:
    type: complex
    description: "Configuration for paginated-reports"
    default:
      command:
        - "uvicorn"
        - "app:app"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8000"
      env:
        - name: 'DATABRICKS_SQL_WAREHOUSE_ID'
          value_from: "sql-warehouse"
        - name: 'LAKEBASE_CATALOG_NAME'
          value: '${var.catalog_name}'
        - name: 'DATABRICKS_SCHEMA'
          value: '${var.schema_name}'
        - name: 'DATABRICKS_VOLUME'
          value: '${var.volume_name}'
        - name: 'LAKEHOUSE_CATALOG_NAME'
          value: '${var.catalog_name}'
        - name: 'LAKEHOUSE_SCHEMA_NAME'
          value: '${var.schema_name}'

resources:
  apps:
    paginated-reports:
      name: "paginated-reports-dev"
      description: "Paginated Reports"
      source_code_path: "./back-end"
      config: ${var.app_config}
      user_api_scopes:
        - sql
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
      resources:
        - name: "sql-warehouse"
          description: "SQL warehouse for the app"
          sql_warehouse:
            id: ${resources.sql_warehouses.paginated_reports_sql_warehouse.id}
            permission: "CAN_USE"
        - name: "database"
          description: "A database for the app to be able to connect to and query"
          database:
            database_name: ${resources.database_catalogs.paginated_reports_db_catalog.database_name}
            instance_name: ${resources.database_catalogs.paginated_reports_db_catalog.database_instance_name}
            permission: "CAN_CONNECT_AND_CREATE"
      permissions:
        - user_name: "*"
          level: "CAN_USE"
  database_instances:
    paginated_reports_db_instance:
      name: paginated-reports-db-instance-dev
      capacity: CU_1
  database_catalogs:
    paginated_reports_db_catalog:
      database_instance_name: ${resources.database_instances.paginated_reports_db_instance.name}
      database_name: "paginated_reports_database_dev"
      name: paginated_reports_database_catalog_dev
      create_database_if_not_exists: true

  sql_warehouses:
    paginated_reports_sql_warehouse:
      name: paginated-reports-warehouse-dev
      cluster_size: "X-Small"
      enable_serverless_compute: true
      max_num_clusters: 1
      min_num_clusters: 1
      auto_stop_mins: 10

targets:
  dev:
    workspace:
        host: https://adb-4065910446400991.11.azuredatabricks.net
    variables:
      catalog_name: "dev_catalog"
      schema_name: "default"
      volume_name: "paginated_files_dev"
  prod:
    variables:
      catalog_name: "reporting_data_prod"
      schema_name: "paginated_prod"
      volume_name: "app_files_prod"
